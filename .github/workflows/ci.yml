# CI gate — runs on every push to main and every pull request. Closes the
# Week-9 follow-up in SECURITY.md ("CI gates"): lint, type-check, and the
# Playwright smoke suite must pass before a deploy promotes.
#
# Vercel still builds + deploys via the GitHub integration; this workflow
# only fails the build status if the gates break. Vercel preview deploys
# happily run in parallel.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: lint + tsc + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Dummy values so the Next build doesn't blow up on missing client
      # env vars — the smoke tests never exercise the real Clerk/Supabase
      # flows. Real secrets are NOT exposed to PRs from forks.
      - name: Run smoke tests
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_SECRET_KEY: sk_test_dummy
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_dummy
          SUPABASE_SERVICE_ROLE_KEY: sb_service_dummy
          TOKEN_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          GOOGLE_OAUTH_CLIENT_ID: dummy
          GOOGLE_OAUTH_CLIENT_SECRET: dummy
          GOOGLE_OAUTH_REDIRECT_URI: http://127.0.0.1:3000/api/google/callback
          ANTHROPIC_API_KEY: dummy
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
