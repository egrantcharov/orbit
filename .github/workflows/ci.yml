# CI gate — runs on every push to main and every pull request. Closes the
# Week-9 follow-up in SECURITY.md ("CI gates"): lint and type-check must pass
# before a deploy promotes.
#
# Why no Playwright here:
#   The smoke suite boots `npm run dev`, which requires a real Clerk
#   publishable key (Clerk's middleware validates the key on startup and
#   refuses to bind otherwise). Storing live test keys in GitHub Actions
#   secrets adds rotation risk for a smoke suite that's already covered
#   by the local `npm run test:e2e` developer workflow + the post-deploy
#   smoke against the prod URL (see PLAYWRIGHT_BASE_URL in playwright.config.ts).
#
# Vercel still builds + deploys via the GitHub integration; this workflow
# only fails the build status if lint or tsc break.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: lint + tsc
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit
